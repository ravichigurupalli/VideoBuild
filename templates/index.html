<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Builder</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .card { max-width: 720px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.06); }
    label { display: block; margin-top: 12px; font-weight: 600; }
    input[type="text"], textarea, select { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; }
    textarea { min-height: 90px; }
    input[type="file"] { margin-top: 6px; }
    button { margin-top: 16px; padding: 12px 18px; border: none; border-radius: 8px; background: #2563eb; color: white; font-weight: 700; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .secondary { background: #111827; }
    .status { margin-top: 12px; font-weight: 600; }
    audio { margin-top: 12px; width: 100%; }
    .card + .card { margin-top: 24px; }
    .img-preview { margin-top: 12px; max-width: 100%; border-radius: 8px; display: none; }
    .green { background: #16a34a; }
    .purple { background: #7c3aed; }
    .orange { background: #ea580c; }
    .video-preview { margin-top: 12px; max-width: 100%; border-radius: 8px; display: none; }
    .mode-tabs { display: flex; gap: 0; margin-top: 12px; }
    .mode-tab { flex: 1; padding: 10px; text-align: center; font-weight: 700; cursor: pointer; border: 1px solid #ccc; background: #f3f4f6; margin-top: 0; color: #374151; }
    .mode-tab:first-child { border-radius: 8px 0 0 8px; }
    .mode-tab:last-child { border-radius: 0 8px 8px 0; }
    .mode-tab.active { background: #7c3aed; color: white; border-color: #7c3aed; }
    .mode-panel { display: none; }
    .mode-panel.active { display: block; }
    .script-box { background: #f9fafb; border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; margin-top: 8px; white-space: pre-wrap; font-size: 14px; line-height: 1.6; min-height: 80px; max-height: 300px; overflow-y: auto; }
    .row { display: flex; gap: 12px; }
    .row > label { flex: 1; }
    .elevenlabs-settings { display: none; margin-top: 4px; }
    .slider-row { display: flex; gap: 16px; align-items: center; }
    .slider-row label { flex: 1; font-size: 13px; }
    .slider-row input[type="range"] { width: 100%; margin-top: 4px; }
    .slider-val { font-weight: 400; color: #6b7280; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Build & Upload Video</h2>
    <form id="form">
      <label>Title
        <input type="text" name="title" value="{{ defaults.title }}" />
      </label>
      <label>Description
        <textarea name="description">{{ defaults.description }}</textarea>
      </label>
      <div class="row">
        <label>Format
          <select name="video_format">
            <option value="video" {% if defaults.video_format == 'video' %}selected{% endif %}>Video (16:9)</option>
            <option value="short" {% if defaults.video_format == 'short' %}selected{% endif %}>Short (9:16)</option>
          </select>
        </label>
        <label>Style
          <select name="video_style">
            <option value="static">Static (slideshow)</option>
            <option value="animated" selected>Animated (pan/zoom)</option>
          </select>
        </label>
      </div>
      <label>Images (multiple allowed)
        <input type="file" name="images" multiple accept="image/*" />
      </label>
      <label>Thumbnail Image
        <input type="file" name="thumbnail" accept="image/*" />
      </label>
      <div class="row">
        <label>Voice
          <select name="tts_provider" class="tts-provider-select">
            <option value="pyttsx3" {% if defaults.tts_provider == 'pyttsx3' %}selected{% endif %}>System Voice (pyttsx3)</option>
            <option value="elevenlabs" {% if defaults.tts_provider == 'elevenlabs' %}selected{% endif %}>ElevenLabs</option>
          </select>
        </label>
        <label class="elevenlabs-voice-label" style="display:none">ElevenLabs Voice
          <select name="voice_id" class="elevenlabs-voice-select">
            <option value="">Loading voices...</option>
          </select>
        </label>
      </div>
      <div class="elevenlabs-settings">
        <div class="slider-row">
          <label>Stability (Emotion) <span class="slider-val">45%</span>
            <input type="range" name="el_stability" min="0" max="100" value="45" class="el-stability-slider">
          </label>
          <label>Similarity (Identity) <span class="slider-val">80%</span>
            <input type="range" name="el_similarity" min="0" max="100" value="80" class="el-similarity-slider">
          </label>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="previewBtn" class="secondary">Preview Voice</button>
        <button type="submit" id="buildBtn">Start</button>
      </div>
      <div id="status" class="status"></div>
      <audio id="previewAudio" controls hidden></audio>
    </form>
  </div>

  <div class="card">
    <h2>Generate Image from Text</h2>
    <form id="imgForm">
      <label>Prompt
        <textarea name="prompt" placeholder="A cinematic sunset over a mountain lake, vibrant colors, 4K"></textarea>
      </label>
      <label>Format
        <select name="video_format">
          <option value="video" {% if defaults.video_format == 'video' %}selected{% endif %}>Video (16:9)</option>
          <option value="short" {% if defaults.video_format == 'short' %}selected{% endif %}>Short (9:16)</option>
        </select>
      </label>
      <div class="actions">
        <button type="submit" id="genBtn" class="green">Generate Image</button>
      </div>
      <div id="imgStatus" class="status"></div>
      <img id="imgPreview" class="img-preview" alt="Generated image" />
    </form>
  </div>

  <div class="card">
    <h2>Text to Video (AI Generated)</h2>

    <div class="mode-tabs">
      <button type="button" class="mode-tab active" data-mode="topic">Generate Script from Topic</button>
      <button type="button" class="mode-tab" data-mode="custom">Use Custom Text</button>
    </div>

    <!-- Mode 1: Generate from Topic -->
    <div id="topicPanel" class="mode-panel active">
      <form id="topicForm">
        <label>Topic / Idea
          <textarea name="topic" rows="3" placeholder="e.g. What are Hybrid Models? Combining traditional ML with Generative AI for better accuracy."></textarea>
        </label>
        <div class="row">
          <label>AI Provider
            <select name="provider">
              <option value="gemini" {% if defaults.script_provider == 'gemini' %}selected{% endif %}>Google Gemini (free)</option>
              <option value="huggingface" {% if defaults.script_provider == 'huggingface' %}selected{% endif %}>HuggingFace</option>
              <option value="ollama" {% if defaults.script_provider == 'ollama' %}selected{% endif %}>Ollama (local)</option>
            </select>
          </label>
          <label>Duration
            <select name="duration">
              <option value="30s">30 seconds</option>
              <option value="60s" selected>60 seconds</option>
              <option value="90s">90 seconds</option>
              <option value="2min">2 minutes</option>
              <option value="3min">3 minutes</option>
            </select>
          </label>
          <label>Format
            <select name="video_format">
              <option value="video" {% if defaults.video_format == 'video' %}selected{% endif %}>Video (16:9)</option>
              <option value="short" {% if defaults.video_format == 'short' %}selected{% endif %}>Short (9:16)</option>
            </select>
          </label>
          <label>Style
            <select name="video_style">
              <option value="static">Static (slideshow)</option>
              <option value="animated" selected>Animated (pan/zoom + subtitles)</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Voice
            <select name="tts_provider" class="tts-provider-select">
              <option value="pyttsx3" {% if defaults.tts_provider == 'pyttsx3' %}selected{% endif %}>System Voice (pyttsx3)</option>
              <option value="elevenlabs" {% if defaults.tts_provider == 'elevenlabs' %}selected{% endif %}>ElevenLabs</option>
            </select>
          </label>
          <label class="elevenlabs-voice-label" style="display:none">ElevenLabs Voice
            <select name="voice_id" class="elevenlabs-voice-select">
              <option value="">Loading voices...</option>
            </select>
          </label>
        </div>
        <div class="elevenlabs-settings">
          <div class="slider-row">
            <label>Stability (Emotion) <span class="slider-val">45%</span>
              <input type="range" name="el_stability" min="0" max="100" value="45" class="el-stability-slider">
            </label>
            <label>Similarity (Identity) <span class="slider-val">80%</span>
              <input type="range" name="el_similarity" min="0" max="100" value="80" class="el-similarity-slider">
            </label>
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="scriptBtn" class="orange">1. Generate Script</button>
        </div>
      </form>
      <div id="scriptStatus" class="status"></div>
      <div id="scriptPreview" class="script-box" style="display:none"></div>
      <div id="scriptEditWrap" style="display:none">
        <label>Edit Script (optional)
          <textarea id="scriptEdit" name="edited_script" rows="6"></textarea>
        </label>
        <div class="actions">
          <button type="button" id="scriptToVideoBtn" class="purple">2. Generate Video from Script</button>
        </div>
      </div>
    </div>

    <!-- Mode 2: Custom Text -->
    <div id="customPanel" class="mode-panel">
      <form id="t2vForm">
        <label>Story / Script
          <textarea name="text" rows="6" placeholder="Enter your full story or script. Each 1-2 sentences become a scene with AI-generated visuals and video clips."></textarea>
        </label>
        <div class="row">
          <label>Format
            <select name="video_format">
              <option value="video" {% if defaults.video_format == 'video' %}selected{% endif %}>Video (16:9)</option>
              <option value="short" {% if defaults.video_format == 'short' %}selected{% endif %}>Short (9:16)</option>
            </select>
          </label>
          <label>Style
            <select name="video_style">
              <option value="static">Static (slideshow)</option>
              <option value="animated" selected>Animated (pan/zoom + subtitles)</option>
            </select>
          </label>
        </div>
        <div class="row">
          <label>Voice
            <select name="tts_provider" class="tts-provider-select">
              <option value="pyttsx3" {% if defaults.tts_provider == 'pyttsx3' %}selected{% endif %}>System Voice (pyttsx3)</option>
              <option value="elevenlabs" {% if defaults.tts_provider == 'elevenlabs' %}selected{% endif %}>ElevenLabs</option>
            </select>
          </label>
          <label class="elevenlabs-voice-label" style="display:none">ElevenLabs Voice
            <select name="voice_id" class="elevenlabs-voice-select">
              <option value="">Loading voices...</option>
            </select>
          </label>
        </div>
        <div class="elevenlabs-settings">
          <div class="slider-row">
            <label>Stability (Emotion) <span class="slider-val">45%</span>
              <input type="range" name="el_stability" min="0" max="100" value="45" class="el-stability-slider">
            </label>
            <label>Similarity (Identity) <span class="slider-val">80%</span>
              <input type="range" name="el_similarity" min="0" max="100" value="80" class="el-similarity-slider">
            </label>
          </div>
        </div>
        <div class="actions">
          <button type="submit" id="t2vBtn" class="purple">Generate Video</button>
        </div>
      </form>
    </div>

    <div id="t2vStatus" class="status"></div>
    <video id="t2vPreview" class="video-preview" controls></video>
  </div>

  <script>
    const form = document.getElementById('form');
    const statusEl = document.getElementById('status');
    const previewBtn = document.getElementById('previewBtn');
    const buildBtn = document.getElementById('buildBtn');
    const previewAudio = document.getElementById('previewAudio');

    previewBtn.addEventListener('click', async () => {
      statusEl.textContent = 'Generating voice preview...';
      previewBtn.disabled = true;
      buildBtn.disabled = true;
      previewAudio.hidden = true;
      previewAudio.pause();
      if (previewAudio.dataset.objectUrl) {
        URL.revokeObjectURL(previewAudio.dataset.objectUrl);
        delete previewAudio.dataset.objectUrl;
      }

      try {
        const data = new FormData();
        data.append('description', form.elements.description.value);
        data.append('tts_provider', form.elements.tts_provider.value);
        if (form.elements.voice_id) data.append('voice_id', form.elements.voice_id.value);
        if (form.elements.tts_provider.value === 'elevenlabs') {
          data.append('el_stability', (form.elements.el_stability.value / 100).toFixed(2));
          data.append('el_similarity', (form.elements.el_similarity.value / 100).toFixed(2));
        }
        const res = await fetch('/preview-voice', { method: 'POST', body: data });
        if (!res.ok) {
          const json = await res.json();
          throw new Error(json.error || 'Failed to preview voice');
        }

        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        previewAudio.src = objectUrl;
        previewAudio.dataset.objectUrl = objectUrl;
        previewAudio.hidden = false;
        await previewAudio.play();
        statusEl.textContent = 'Voice preview ready';
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        previewBtn.disabled = false;
        buildBtn.disabled = false;
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusEl.textContent = 'Uploading and building...';
      const data = new FormData(form);
      previewBtn.disabled = true;
      buildBtn.disabled = true;
      try {
        const res = await fetch('/build', { method: 'POST', body: data });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Failed');
        statusEl.textContent = `Done: ${json.title} (${json.video_format})`;
      } catch (err) {
        statusEl.textContent = 'Error: ' + err.message;
      } finally {
        previewBtn.disabled = false;
        buildBtn.disabled = false;
      }
    });

    // --- Mode Tabs ---
    const modeTabs = document.querySelectorAll('.mode-tab');
    const topicPanel = document.getElementById('topicPanel');
    const customPanel = document.getElementById('customPanel');

    modeTabs.forEach(tab => {
      tab.addEventListener('click', () => {
        modeTabs.forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        topicPanel.classList.toggle('active', tab.dataset.mode === 'topic');
        customPanel.classList.toggle('active', tab.dataset.mode === 'custom');
      });
    });

    // --- Text to Video (shared) ---
    const t2vStatus = document.getElementById('t2vStatus');
    const t2vPreview = document.getElementById('t2vPreview');

    // --- ElevenLabs voice loading ---
    let elVoicesCache = null;

    async function loadElevenLabsVoices() {
      if (elVoicesCache) return elVoicesCache;
      try {
        const res = await fetch('/elevenlabs-voices');
        const json = await res.json();
        if (!res.ok) throw new Error(json.error);
        elVoicesCache = json.voices;
        return elVoicesCache;
      } catch (err) {
        console.error('Failed to load ElevenLabs voices:', err);
        return [];
      }
    }

    function populateVoiceDropdown(selectEl, voices) {
      selectEl.innerHTML = '';
      const defaultId = '{{ defaults.elevenlabs_voice_id }}';
      voices.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.voice_id;
        opt.textContent = v.name + (v.category ? ` (${v.category})` : '');
        if (v.voice_id === defaultId) opt.selected = true;
        selectEl.appendChild(opt);
      });
      if (!voices.length) {
        selectEl.innerHTML = '<option value="">No voices found</option>';
      }
    }

    // Toggle ElevenLabs voice dropdown + settings sliders visibility
    document.querySelectorAll('.tts-provider-select').forEach(sel => {
      const container = sel.closest('form') || sel.closest('.card');
      const voiceLabel = container.querySelector('.elevenlabs-voice-label');
      const settingsDiv = container.querySelector('.elevenlabs-settings');
      function toggle() {
        const isEl = sel.value === 'elevenlabs';
        if (voiceLabel) voiceLabel.style.display = isEl ? '' : 'none';
        if (settingsDiv) settingsDiv.style.display = isEl ? 'block' : 'none';
        if (isEl && voiceLabel) {
          const voiceSel = voiceLabel.querySelector('.elevenlabs-voice-select');
          if (voiceSel && voiceSel.options.length <= 1) {
            if (elVoicesCache) {
              populateVoiceDropdown(voiceSel, elVoicesCache);
            } else {
              loadElevenLabsVoices().then(voices => populateVoiceDropdown(voiceSel, voices));
            }
          }
        }
      }
      sel.addEventListener('change', toggle);
      toggle();
    });

    // Wire up slider value labels
    document.querySelectorAll('.el-stability-slider').forEach(slider => {
      const valSpan = slider.parentElement.querySelector('.slider-val');
      slider.addEventListener('input', () => { valSpan.textContent = slider.value + '%'; });
    });
    document.querySelectorAll('.el-similarity-slider').forEach(slider => {
      const valSpan = slider.parentElement.querySelector('.slider-val');
      slider.addEventListener('input', () => { valSpan.textContent = slider.value + '%'; });
    });

    async function generateVideoFromText(text, videoFormat, videoStyle, ttsProvider, voiceId, elStability, elSimilarity, btn) {
      t2vStatus.textContent = 'Generating video... This takes several minutes (AI images + video clips + TTS + stitching).';
      t2vPreview.style.display = 'none';
      btn.disabled = true;

      if (t2vPreview.dataset.objectUrl) {
        URL.revokeObjectURL(t2vPreview.dataset.objectUrl);
        delete t2vPreview.dataset.objectUrl;
      }

      try {
        const data = new FormData();
        data.append('text', text);
        data.append('video_format', videoFormat);
        data.append('video_style', videoStyle);
        data.append('tts_provider', ttsProvider);
        if (voiceId) data.append('voice_id', voiceId);
        if (ttsProvider === 'elevenlabs') {
          data.append('el_stability', (elStability / 100).toFixed(2));
          data.append('el_similarity', (elSimilarity / 100).toFixed(2));
        }
        const res = await fetch('/text-to-video', { method: 'POST', body: data });
        if (!res.ok) {
          const json = await res.json();
          throw new Error(json.error || 'Text-to-video failed');
        }

        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        t2vPreview.src = objectUrl;
        t2vPreview.dataset.objectUrl = objectUrl;
        t2vPreview.style.display = 'block';
        t2vStatus.textContent = 'Video generated! You can preview and right-click to save.';
      } catch (err) {
        t2vStatus.textContent = 'Error: ' + err.message;
      } finally {
        btn.disabled = false;
      }
    }

    // --- Mode 1: Generate Script from Topic ---
    const topicForm = document.getElementById('topicForm');
    const scriptBtn = document.getElementById('scriptBtn');
    const scriptStatus = document.getElementById('scriptStatus');
    const scriptPreview = document.getElementById('scriptPreview');
    const scriptEditWrap = document.getElementById('scriptEditWrap');
    const scriptEdit = document.getElementById('scriptEdit');
    const scriptToVideoBtn = document.getElementById('scriptToVideoBtn');

    topicForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      scriptStatus.textContent = 'Generating script from your topic...';
      scriptPreview.style.display = 'none';
      scriptEditWrap.style.display = 'none';
      scriptBtn.disabled = true;

      try {
        const data = new FormData(topicForm);
        const res = await fetch('/generate-script', { method: 'POST', body: data });
        const json = await res.json();
        if (!res.ok) throw new Error(json.error || 'Script generation failed');

        scriptPreview.textContent = json.script;
        scriptPreview.style.display = 'block';
        scriptEdit.value = json.script;
        scriptEditWrap.style.display = 'block';
        scriptStatus.textContent = 'Script generated! Review, edit if needed, then click Generate Video.';
      } catch (err) {
        scriptStatus.textContent = 'Error: ' + err.message;
      } finally {
        scriptBtn.disabled = false;
      }
    });

    scriptToVideoBtn.addEventListener('click', () => {
      const text = scriptEdit.value.trim();
      if (!text) { t2vStatus.textContent = 'Error: Script is empty.'; return; }
      const fmt = topicForm.elements.video_format.value;
      const sty = topicForm.elements.video_style.value;
      const tts = topicForm.elements.tts_provider.value;
      const vid = topicForm.elements.voice_id ? topicForm.elements.voice_id.value : '';
      const stab = topicForm.elements.el_stability ? topicForm.elements.el_stability.value : 45;
      const sim = topicForm.elements.el_similarity ? topicForm.elements.el_similarity.value : 80;
      generateVideoFromText(text, fmt, sty, tts, vid, stab, sim, scriptToVideoBtn);
    });

    // --- Mode 2: Custom Text ---
    const t2vForm = document.getElementById('t2vForm');
    const t2vBtn = document.getElementById('t2vBtn');

    t2vForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = t2vForm.elements.text.value.trim();
      if (!text) { t2vStatus.textContent = 'Error: Text is required.'; return; }
      const fmt = t2vForm.elements.video_format.value;
      const sty = t2vForm.elements.video_style.value;
      const tts = t2vForm.elements.tts_provider.value;
      const vid = t2vForm.elements.voice_id ? t2vForm.elements.voice_id.value : '';
      const stab = t2vForm.elements.el_stability ? t2vForm.elements.el_stability.value : 45;
      const sim = t2vForm.elements.el_similarity ? t2vForm.elements.el_similarity.value : 80;
      generateVideoFromText(text, fmt, sty, tts, vid, stab, sim, t2vBtn);
    });

    // --- Image Generation ---
    const imgForm = document.getElementById('imgForm');
    const imgStatus = document.getElementById('imgStatus');
    const imgPreview = document.getElementById('imgPreview');
    const genBtn = document.getElementById('genBtn');

    imgForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      imgStatus.textContent = 'Generating image... (this may take 30-60s)';
      imgPreview.style.display = 'none';
      genBtn.disabled = true;

      if (imgPreview.dataset.objectUrl) {
        URL.revokeObjectURL(imgPreview.dataset.objectUrl);
        delete imgPreview.dataset.objectUrl;
      }

      try {
        const data = new FormData(imgForm);
        const res = await fetch('/generate-image', { method: 'POST', body: data });
        if (!res.ok) {
          const json = await res.json();
          throw new Error(json.error || 'Image generation failed');
        }

        const blob = await res.blob();
        const objectUrl = URL.createObjectURL(blob);
        imgPreview.src = objectUrl;
        imgPreview.dataset.objectUrl = objectUrl;
        imgPreview.style.display = 'block';
        imgStatus.textContent = 'Image generated! Right-click to save.';
      } catch (err) {
        imgStatus.textContent = 'Error: ' + err.message;
      } finally {
        genBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
